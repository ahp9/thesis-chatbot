rubric_name: "SRL Router — Phase Classification v2"
rubric_type: router

criteria:

  phase_signal_accuracy:
    what_to_evaluate: >
      Evaluate whether each signal in route.signals is directly traceable to
      an observable phrase, action, omission, or artifact in STUDENT_MESSAGE
      or RECENT_CONTEXT.

      Signals must describe only what is explicitly present or absent.
      Do not reward inferred intent unless the wording clearly supports it.
    score_3: >
      All signals map directly to observable student behaviour or explicit absence
      of required task information.
    score_2: >
      Most signals are grounded. One signal slightly over-interprets wording but
      remains plausible.
    score_1: >
      At least one signal depends on inferred intent or weak interpretation.
    score_0: >
      Signals contradict the student message, invent evidence, or could apply
      equally to unrelated messages.
    do_not_accept:
      - Signals describing what the student might mean without wording support
      - Generic signals reusable across almost any message
      - Signals derived from tutor response rather than student input

  phase_correctness:
    what_to_evaluate: >
      Evaluate whether the selected SRL phase matches the student's actual learning state.

      FORETHOUGHT:
      Student is still orienting, defining the task, identifying constraints,
      or deciding how to begin.

      PERFORMANCE:
      Student has a sufficiently defined task or subtask and is actively trying
      to progress, even if they have not yet produced an artifact.

      REFLECTION:
      Student is evaluating completed work, interpreting results, reviewing mistakes,
      or judging learning outcomes.

      Task specificity alone does not force PERFORMANCE unless meaningful execution
      support can begin immediately.
    score_3: >
      Phase is clearly correct and best supported by the message.
    score_2: >
      Phase is correct but adjacent competition exists.
    score_1: >
      Adjacent phase would fit better.
    score_0: >
      Wrong phase selected; response mode would likely become inappropriate.
    do_not_accept:
      - FORETHOUGHT when prior turns already define an executable task
      - PERFORMANCE when student is clearly evaluating finished work
      - REFLECTION during active task continuation

  confidence_calibration:
    what_to_evaluate: >
      Evaluate whether confidence reflects phase competition, not merely missing task detail.

      High confidence is appropriate when one phase clearly dominates,
      even if task details remain underspecified.

      Lower confidence is required only when multiple phases are genuinely plausible.
    score_3: >
      Confidence matches actual phase competition:
      high when one phase dominates, lower when adjacent phases compete.
    score_2: >
      Slight over- or under-confidence but still reasonable.
    score_1: >
      Noticeable mismatch between confidence and actual phase competition.
    score_0: >
      Confidence strongly contradicts evidence.
    do_not_accept:
      - Penalizing high confidence solely because task details are incomplete
      - High confidence when multiple phases are equally plausible
      - Very low confidence when one phase clearly dominates

  task_definition_boundary:
    what_to_evaluate: >
      Evaluate whether the router correctly distinguishes between:

      task mentioned:
      domain, subject, or broad activity named but no executable objective exists

      task defined:
      enough concrete objective exists that meaningful task support can begin

      Mentioning a domain (e.g. Python, math, essay) is not by itself task definition.
    score_3: >
      Correctly distinguishes mention vs definition.
    score_2: >
      Mostly correct with slight over-reading.
    score_1: >
      Boundary handled inconsistently.
    score_0: >
      Domain mention incorrectly treated as task definition.
    examples_forethought:
      - "I need to do something with Python"
      - "I have math homework and don't know where to start"
      - "I need help with my essay but haven't started"
    examples_performance:
      - "I need to write a Python loop"
      - "How do I sort this list?"
      - "Why does this equation fail?"

  artifact_rule_applied:
    applicability: >
      Score only if student provided code, draft, text, plan, result, or artifact.

    what_to_evaluate: >
      Distinguish:

      evaluation / judgement / verification -> REFLECTION

      continuation / revision / next-step help -> PERFORMANCE
    score_3: >
      Correct phase, artifact explicitly cited, intent distinction clear.
    score_2: >
      Correct phase, artifact noticed, distinction partially stated.
    score_1: >
      Correct phase but artifact ignored in signals.
    score_0: >
      Artifact present but wrong phase assigned.
    do_not_accept:
      - Evaluation request routed to PERFORMANCE
      - Continuation request routed to REFLECTION

fail_flags:
  - id: FORETHOUGHT_AFTER_EXECUTABLE_TASK_DEFINED
    trigger: >
      FORETHOUGHT selected when prior context already contains a concrete executable task
  - id: HIGH_CONFIDENCE_WITH_REAL_PHASE_COMPETITION
    trigger: >
      Confidence ≥ 0.80 when two adjacent phases are genuinely plausible.
  - id: PHASE_REGRESSION_WITHOUT_EXPLICIT_EVIDENCE
    trigger: >
      Phase moved backward without clear student evidence.
  - id: DOMAIN_MISREAD_AS_TASK_DEFINITION
    trigger: >
      Domain mention treated as executable task definition.
  - id: ARTIFACT_INTENT_MISCLASSIFIED
    trigger: >
      Artifact present but continuation/evaluation intent routed incorrectly.
  - id: SIGNALS_NOT_OBSERVABLE
    trigger: >
      One or more signals depend on invented intent rather than observable wording.