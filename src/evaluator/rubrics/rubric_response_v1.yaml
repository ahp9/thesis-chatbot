rubric_name: "SRL Response — Pedagogical Quality"
rubric_type: response

criteria:

  solution_containment:
    what_to_evaluate: >
      Evaluate whether the response preserves meaningful student work in PRODUCT
      requests. A full solution is a response that would allow the student to
      directly submit, run, or adopt the result with little or no further
      reasoning, interpretation, or implementation of their own.

      Full solutions include: complete runnable code, fully worked answers,
      direct final outputs, or complete procedural walkthroughs that remove
      the key intellectual step from the student.

      Strong scaffolding is acceptable when it still leaves a real reasoning,
      decision, interpretation, or implementation step to the student.

      RESOURCE requests (explain, summarise, define, evaluate, give feedback)
      are exempt and should receive complete direct answers.

    score_3: "Response gives only what is needed for the student's next step and clearly leaves meaningful reasoning or implementation to the student. For RESOURCE requests, gives a complete direct answer."
    score_2: "Response gives substantial scaffolding but still leaves a meaningful task element for the student to complete."
    score_1: "Response comes close to solving the task. Student's remaining contribution is minimal."
    score_0: "Response effectively completes the task for the student in a directly usable form."

    do_not_accept:
      - Complete runnable code when the student has not attempted the task
      - A full worked answer that can be directly submitted
      - A step-by-step implementation where only trivial filling remains
      - A full solution presented as an example when it directly solves the student's task


  phase_alignment:
    what_to_evaluate: >
      Evaluate whether the response matches the instructional purpose of the phase.

      FORETHOUGHT should help frame the goal, choose direction, or decide how to begin.
      It should NOT solve or begin executing the task.

      PERFORMANCE should support progress on the next step while preserving student reasoning.
      It should NOT introduce reflective review of finished work.

      REFLECTION should help inspect, evaluate, or learn from existing work.
      It should NOT introduce new task work or new implementation steps.

    score_3: "Response fully matches the phase in both content and instructional stance. The dominant move is phase-correct."
    score_2: "Response matches the phase with minor drift."
    score_1: "Response noticeably mixes phases."
    score_0: "Response clearly contradicts the phase."

    do_not_accept:
      - FORETHOUGHT directly solving the task
      - REFLECTION introducing new task work
      - PERFORMANCE replacing student reasoning entirely


  support_level_fidelity:
    what_to_evaluate: >
      Evaluate whether the response broadly reflects the intended support level.

      CLARIFY: Should ask the student for more information before doing anything else.
      QUESTION: Should return a single focused question that activates student thinking.
      HINT: Should nudge toward the next step without explaining it.
      EXPLAIN: Should teach the relevant concept or strategy fully.
      PARTIAL: Should provide part of the implementation or worked example.
      STRUCTURE: Should outline the approach without filling it in.

      Small natural blending between neighbouring support levels is acceptable.
      The key question is whether the dominant instructional move matches the intended level.

    score_3: "Response clearly matches the intended support level. The dominant move is unambiguous."
    score_2: "Response mostly matches with small blending. Dominant move is still correct."
    score_1: "Response noticeably shifts toward another support level."
    score_0: "Response ignores the intended support level entirely."

    do_not_accept:
      - A HINT functioning as a full explanation
      - A QUESTION functioning as a complete answer
      - A STRUCTURE functioning as a near-complete solution


  socratic_quality:
    what_to_evaluate: >
      Evaluate whether the response returns cognitive agency to the student.

      In FORETHOUGHT and PERFORMANCE, this can happen through:
      - a substantive question that requires the student to think
      - a concrete next student action (e.g., "try writing just the base case")
      - a clear prompt to compare, decide, predict, or attempt

      A question is not required if agency is clearly returned through another form.

      OVER-QUESTIONING RULE: If the response asks 3 or more questions at once,
      cap the score at 1. Asking multiple questions simultaneously overloads
      working memory and the student does not know which to engage with.

    score_3: "Response clearly returns the next cognitive move to the student via a single focused question, concrete attempt prompt, or clear decision to make."
    score_2: "Response encourages student engagement but the invitation is vague or weakly directed."
    score_1: "Response includes only limited student activation. Question is rhetorical, the answer was already given, or 3+ questions are asked at once."
    score_0: "Response leaves the tutor holding the reasoning. Student has nothing to do."

    do_not_accept:
      - A rhetorical question asked after the answer has already been given
      - '"Does that make sense?" as the only closing move'
      - '"Let me know if you have questions" as substitute for agency'
      - Three or more questions asked simultaneously


  metacognitive_activation:
    what_to_evaluate: >
      Evaluate whether the response encourages the student to think about
      their own process in a way that is appropriate for the current phase.

      Phase-appropriate metacognition:
        FORETHOUGHT -> planning, goal-setting, resource identification, strategy selection
        PERFORMANCE  -> self-monitoring, progress checking, error detection, adjusting strategy
        REFLECTION   -> self-evaluation, outcome attribution, identifying what to do differently

      Explicit naming of metacognitive processes is not required — the response
      just needs to activate a relevant self-regulatory process for the phase.

    score_3: "Response clearly prompts a phase-correct metacognitive process tied to the specific task."
    score_2: "Response includes useful process-oriented thinking but the connection to the task or phase is slightly weak."
    score_1: "Response includes only weak process prompting — generic encouragement with no task link, or a metacognitive prompt belonging to a different phase."
    score_0: "Response delivers content only. No process prompting of any kind."

    do_not_accept:
      - Generic encouragement with no task link
      - Restating task requirements without process support
      - Phase-mismatched metacognitive prompts (e.g., Reflection metacognition in Performance)


  expertise_adaptive_language:
    what_to_evaluate: >
      Evaluate whether the response vocabulary, analogy depth, and assumed
      knowledge match the student's diagnosed expertise level.

      NOVICE: Avoid jargon unless defined. Use concrete analogies. Explain
      prerequisite concepts before building on them.

      INTERMEDIATE: Assume foundational vocabulary. Use technical terms
      correctly. Analogies are optional.

      ADVANCED: Use precise technical vocabulary. No need for basic analogies.
      Can reference adjacent concepts or trade-offs without explaining them in full.
      Treat the student as a peer.

    score_3: "Vocabulary and depth are well-calibrated to the student's level. The response would land clearly without under- or over-explaining."
    score_2: "Language is mostly calibrated with minor mismatches — one undefined term for a NOVICE, or one unnecessary simplification for an ADVANCED student."
    score_1: "Noticeable mismatch between language level and expertise. The student would need significant additional effort to decode the response."
    score_0: "Language is clearly wrong for the student's level — pure jargon for a NOVICE, or condescending over-simplification for an ADVANCED student."

    do_not_accept:
      - Undefined jargon for NOVICE students
      - Beginner-level analogies for ADVANCED students without a clear reason
      - Assumptions of knowledge the student has not demonstrated


  request_kind_respect:
    what_to_evaluate: >
      Evaluate whether response mode matches request kind.

      RESOURCE requests should receive direct, complete answers. Socratic
      deflection in response to an explanation request is not appropriate.

      PRODUCT requests should preserve student ownership. Giving a full
      solution removes the learning opportunity the task was designed to provide.

    score_3: "Correct mode applied cleanly."
    score_2: "Correct mode with minor contamination."
    score_1: "Mixed mode — neither fully satisfying the RESOURCE request nor fully protecting the PRODUCT task."
    score_0: "Wrong mode applied entirely."

    do_not_accept:
      - Socratic evasion for RESOURCE requests
      - Full solution for PRODUCT requests


  multi_turn_coherence:
    applicability: >
      Score only when at least one prior assistant turn exists before the
      evaluated response. If the conversation has only one assistant turn,
      mark this criterion not applicable.

    what_to_evaluate: >
      Evaluate whether the response builds on prior progress and avoids repeating
      support that already failed.

      Also evaluate whether the tutor acknowledges what the student got right
      before scaffolding the next step. Progress acknowledgment does not require
      explicit praise — a simple "You've correctly handled the base case — now
      let's look at the recursive step" is sufficient.

    score_3: "Builds directly on prior progress and acknowledges what the student got right before moving forward."
    score_2: "Coherent with prior turns and avoids repetition, but does not explicitly acknowledge the student's progress."
    score_1: "Partly repetitive — re-explains something the student already demonstrated, or ignores a partial attempt from the previous turn."
    score_0: "Repeats failed support verbatim, or completely ignores the student's most recent attempt."

    do_not_accept:
      - Repeating the same failed hint across turns
      - Ignoring student attempt or partial progress
      - Scaffolding the next step without any acknowledgment of what the student got right


fail_flags:
  - id: FULL_SOLUTION_FOR_PRODUCT_REQUEST
    trigger: "Directly usable full answer, runnable code, fully worked derivation, or complete solution that removes meaningful student work."

  - id: RUNNABLE_CODE_WITHOUT_ATTEMPT
    trigger: "Runnable code delivered when student has not attempted the task."

  - id: NO_STUDENT_AGENCY_IN_PERFORMANCE_RESPONSE
    trigger: "PERFORMANCE response leaves no reasoning, decision, or action to the student."

  - id: REFLECTION_RESPONSE_DOES_NEW_TASK_WORK
    trigger: "REFLECTION response introduces new task work or implementation steps."

  - id: FORETHOUGHT_RESPONSE_EXECUTES_TASK
    trigger: "FORETHOUGHT response directly begins solving the task."

  - id: SUPPORT_LEVEL_IGNORED_BY_RESPONSE
    trigger: "Dominant response mode contradicts the intended support level."

  - id: RESOURCE_REQUEST_ANSWERED_WITH_SOCRATIC_QUESTIONS
    trigger: "Direct explanation request answered mainly with deflection or questions."

  - id: PRIOR_FAILED_HINT_REPEATED
    trigger: "Same failed hint or support move repeated across turns without escalation."

  - id: OVER_QUESTIONING
    trigger: "Response asks 3 or more questions simultaneously."

  - id: PHASE_MISMATCHED_METACOGNITION
    trigger: "Response includes a metacognitive prompt that belongs to a different SRL phase than the current one."

  - id: LANGUAGE_MISMATCH_NOVICE
    trigger: "Response uses undefined jargon or assumes prerequisite knowledge that a NOVICE student has not demonstrated."

  - id: PROGRESS_NOT_ACKNOWLEDGED_MULTI_TURN
    trigger: "In a multi-turn conversation, tutor scaffolds the next step without any acknowledgment of what the student got right in the previous turn."