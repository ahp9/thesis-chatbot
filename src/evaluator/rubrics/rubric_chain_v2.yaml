rubric_name: "SRL Chain — Diagnosis and Support-Level Decision"
rubric_type: chain

criteria:

  diagnosis_accuracy:
    what_to_evaluate: >
      Evaluate whether the checkpoint correctly identified:
      - request_kind      (RESOURCE vs PRODUCT)
      - task_stage        (STARTING / WORKING / REVIEWING)
      - progress_state    (MOVING / STALLED / DONEISH)
      - expertise_level   (NOVICE / INTERMEDIATE / ADVANCED)
      - context_gap       (NONE / SMALL / CRITICAL)
      Check that the rationale cites specific evidence from the user message
      for each of these fields.

    score_3: "All fields accurately match the student's message. Rationale cites specific evidence for expertise and progress state."
    score_2: "Fields are mostly correct but rationale is thin or missing evidence for one field."
    score_1: "One major field (request_kind or expertise_level) is wrong, or rationale is entirely missing."
    score_0: "Two or more major fields are wrong. Diagnosis does not reflect the student's actual state."

  support_alignment_and_depth:
    what_to_evaluate: >
      Evaluate whether the support_level and support_depth match the expertise_level floors:
        - NOVICE:       Surface or Substantive (floor = Surface)
        - INTERMEDIATE: Substantive floor
        - ADVANCED:     Deep floor

      Also check whether CLARIFY was used when context_gap is CRITICAL,
      and whether QUESTION was used for NOVICE/STARTING combinations.

      The support depth must also map to the correct metacognitive strategy type
      for the current SRL phase:
        FORETHOUGHT:  depth should scaffold PLANNING or GOAL-SETTING
        PERFORMANCE:  depth should scaffold MONITORING or ERROR-DETECTION
        REFLECTION:   depth should scaffold SELF-EVALUATION or ATTRIBUTION

    score_3: "Support level is appropriate for the stage. Depth meets or exceeds the expertise floor. Metacognitive strategy type matches the current phase."
    score_2: "Support level is appropriate but depth is one level off, or depth is correct but metacognitive type is slightly misaligned."
    score_1: "Support level is inappropriate for the student's state (e.g., HINT when STALLED with a CRITICAL context gap)."
    score_0: "Support level violates core SRL rules (e.g., PARTIAL or EXPLAIN to a NOVICE with no attempt on a PRODUCT request)."

  implementation_gate:
    what_to_evaluate: >
      Evaluate whether implementation_allowed and can_show_code are set correctly.

      Should be FALSE when:
      - PRODUCT request with no student attempt.
      - Support level is QUESTION, CLARIFY, or HINT.

      May be TRUE when:
      - Support is PARTIAL or EXPLAIN AND the student is STALLED, highly frustrated,
        or is a NOVICE who has made at least one attempt.

    score_3: "Gate is correctly closed or open. Rationale references the relevant rule and cites supporting evidence."
    score_2: "Gate is technically correct but rationale does not explain which rule triggered the decision."
    score_1: "Gate is open in a borderline case where a more cautious decision would have been safer."
    score_0: "Gate is open for a PRODUCT request with no student attempt."

  check_rewrite_consistency:
    what_to_evaluate: >
      Evaluate the internal check field. If the check flagged leaks_solution,
      was_rewritten must be true. If was_rewritten is true, verify the final
      response no longer contains the leak.

    score_3: "Check passed cleanly, or a flagged leak was fully resolved by the rewrite."
    score_2: "Rewrite triggered and resolved the leak, but the final response became too brief or unhelpful as a result."
    score_1: "Rewrite triggered but a partial leak remains in the final output."
    score_0: "Check flagged a leak but was_rewritten is false. Leak is present in the final response."

  affective_signal_sensitivity:
    what_to_evaluate: >
      Evaluate whether the chain correctly detected and responded to the student's
      emotional or motivational signals.

      Signals to detect:
      - Explicit frustration language ("I've been stuck for an hour", "I give up")
      - Passive helplessness ("just tell me", "I don't know")
      - Confidence language ("I think I understand but...", "I'm not sure if...")
      - Emotional punctuation (repeated question marks, capitalisation)

      Evaluate whether:
      1. The frustration or emotional_state field correctly reflects the signal.
      2. The support_level decision accounts for it —
         high frustration + STALLED should escalate support beyond HINT.

    score_3: "Chain correctly detected the emotional signal and the support_level decision reflects it appropriately."
    score_2: "Chain correctly detected the signal but the support_level decision does not fully account for it."
    score_1: "Chain partially detected the signal (e.g., notes some frustration but sets frustration=LOW)."
    score_0: "Chain completely missed a clear emotional signal, leading to an inappropriate support decision."

fail_flags:
  - id: DEPTH_BELOW_FLOOR
    trigger: "support_depth=SURFACE when expertise_level is INTERMEDIATE or ADVANCED"

  - id: IMPLEMENTATION_WITHOUT_ATTEMPT
    trigger: "implementation_allowed=true for PRODUCT request when has_attempt=false"

  - id: CLARIFY_SKIPPED_ON_CRITICAL_GAP
    trigger: "context_gap=CRITICAL but support_level is not CLARIFY"

  - id: CODE_SHOWN_WITHOUT_FRUSTRATION_OR_STALL
    trigger: "can_show_code=true when frustration=LOW and progress=MOVING and expertise is not NOVICE"

  - id: CHECK_FAILED_NO_REWRITE
    trigger: "check.leaks_solution=true but was_rewritten=false"

  - id: METACOGNITIVE_TYPE_MISMATCH
    trigger: "Support depth scaffolds a metacognitive process belonging to a different SRL phase than the current one."

  - id: FRUSTRATION_IGNORED_IN_SUPPORT_DECISION
    trigger: "frustration=HIGH or emotional_state indicates distress, but support_level was not escalated beyond HINT despite progress_state=STALLED."