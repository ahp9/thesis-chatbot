rubric_name: "SRL Router — Phase Classification"
rubric_type: router

criteria:

  phase_signal_accuracy:
    what_to_evaluate: >
      Evaluate whether each signal in route.signals is directly traceable to
      an observable phrase, action, omission, or artifact in STUDENT_MESSAGE
      or RECENT_CONTEXT.

      Signals must describe only what is explicitly present or absent.
      Do not reward inferred intent unless the wording clearly supports it.

    score_3: "All signals map directly to observable student behaviour or explicit absence of required task information."
    score_2: "Most signals are grounded. One signal slightly over-interprets wording but remains plausible."
    score_1: "At least one signal depends on inferred intent or weak interpretation not supported by the wording."
    score_0: "Signals contradict the student message, invent evidence, or are too generic to have routing value."

    do_not_accept:
      - Signals describing what the student might mean without wording support
      - Generic signals reusable across almost any message
      - Signals derived from tutor response rather than student input

  phase_correctness:
    what_to_evaluate: >
      Evaluate whether the selected SRL phase matches the student's actual learning state.

      FORETHOUGHT (Planning / Orientation): The student is still orienting,
      defining the task, identifying constraints, clarifying goals, or deciding
      how to begin. This phase applies when the task is not yet sufficiently
      defined for concrete technical progress. Simply expressing a need to start
      an assignment, naming a subject area, or asking for general direction
      remains FORETHOUGHT if the specific objective is still unclear.

      PERFORMANCE (Execution / Active Help): The student has a sufficiently
      defined task, goal, or subtask and is actively trying to progress.
      This begins once the task definition or concrete objective is clear enough
      that technical, conceptual, or procedural support can be given. The
      student does not need to have produced an artifact yet — PERFORMANCE
      includes working through the assignment after task definition.

      REFLECTION (Evaluation / Review): The student is evaluating completed work,
      interpreting results, reviewing mistakes, judging correctness, or assessing
      learning outcomes. This phase applies when the primary intent is to assess
      or interpret existing work rather than continue task execution.

    score_3: "Phase is clearly correct and best supported by the message. No adjacent phase could reasonably compete."
    score_2: "Phase is correct but adjacent competition exists. The selected phase is still the best fit."
    score_1: "An adjacent phase would fit better. The selected phase is not clearly wrong but misses the dominant signal."
    score_0: "Wrong phase selected. The response mode would become inappropriate as a result."

    do_not_accept:
      - Phase stagnation (staying in FORETHOUGHT after an actionable objective is established)
      - Phase prematureness (selecting PERFORMANCE before the objective is defined)
      - Phase misalignment (selecting REFLECTION while the student is still actively building)

  confidence_calibration:
    what_to_evaluate: >
      Evaluate whether confidence reflects actual phase competition, not merely
      missing task detail.

      High confidence is appropriate when one phase clearly dominates, even if
      task details remain underspecified.

      Lower confidence is required only when multiple phases are genuinely plausible.

    score_3: "Confidence matches actual phase competition — high when one phase dominates, lower when adjacent phases genuinely compete."
    score_2: "Slight over- or under-confidence but still reasonable given the evidence."
    score_1: "Noticeable mismatch — very high confidence when phases compete, or very low confidence when one phase clearly dominates."
    score_0: "Confidence strongly contradicts the evidence in the message."

    do_not_accept:
      - Penalising high confidence solely because task details are incomplete
      - High confidence when multiple phases are equally plausible
      - Very low confidence when one phase clearly dominates

  task_definition_boundary:
    what_to_evaluate: >
      Evaluate whether the router correctly distinguishes between:

      task MENTIONED:
        Domain, subject, or broad activity named but no executable objective exists.
        Examples: "I need to do something with Python", "I have math homework",
        "I need help with my essay but haven't started"

      task DEFINED:
        Enough concrete objective exists that meaningful task support can begin.
        Examples: "I need to write a Python loop that sums a list",
        "How do I sort this list?", "Why does this equation fail?"

    score_3: "Correctly distinguishes mention from definition. Domain-only messages route to FORETHOUGHT; concrete objective messages route to PERFORMANCE."
    score_2: "Mostly correct with slight over-reading of a vague objective as sufficiently defined."
    score_1: "Boundary handled inconsistently within the conversation."
    score_0: "Domain mention is incorrectly treated as task definition, routing to PERFORMANCE when FORETHOUGHT is required."

    examples_forethought:
      - "I need to do something with Python"
      - "I have math homework and don't know where to start"
      - "I need help with my essay but haven't started"

    examples_performance:
      - "I need to write a Python loop that reverses a string"
      - "How do I sort this list in descending order?"
      - "Why does this equation produce a negative result?"

  artifact_rule_applied:
    applicability: >
      Score only if the student provided code, draft, text, plan, result, or artifact.

    what_to_evaluate: >
      Distinguish between:
      - evaluation / judgement / verification of existing artifact → REFLECTION
      - continuation / revision / next-step help with existing artifact → PERFORMANCE

      The student's intent determines the phase, not the presence of the artifact alone.

    score_3: "Correct phase selected. Artifact explicitly cited in signals. Evaluation vs continuation distinction clearly stated in rationale."
    score_2: "Correct phase selected. Artifact noticed but evaluation vs continuation distinction only partially stated."
    score_1: "Correct phase selected but artifact not cited in signals — right call, insufficient reasoning."
    score_0: "Artifact present but wrong phase assigned."

    do_not_accept:
      - Evaluation request routed to PERFORMANCE
      - Continuation request routed to REFLECTION

  affective_phase_sensitivity:
    what_to_evaluate: >
      Evaluate whether the router correctly detected affective or motivational
      signals and represented them in the phase classification and/or confidence.

      The router does not need to change the phase based on affect — it needs to
      detect the signal and represent it in the route output (e.g., in a signal
      entry, confidence note, or explicit emotional flag).

      Signals include:
      - Explicit anxiety ("I'm panicking", "I don't know where to even start")
      - Learned helplessness ("just tell me", "I give up")
      - Self-efficacy language ("I think I can figure this out if...")
      - Emotional punctuation ("???", ALL CAPS, ellipses indicating uncertainty)

    score_3: "Router correctly detected the emotional signal and represented it in the route output."
    score_2: "Router detected the signal but represented it only weakly (e.g., buried in a generic signal)."
    score_1: "Router missed a moderate emotional signal but otherwise classified the phase correctly."
    score_0: "Router completely ignored an explicit emotional signal. Route output contains no representation of the emotional context."

    do_not_accept:
      - Ignoring explicit emotional language in signals entirely
      - Changing the phase based on affect alone without cognitive evidence

fail_flags:
  - id: FORETHOUGHT_AFTER_EXECUTABLE_TASK_DEFINED
    trigger: "FORETHOUGHT selected when prior context already contains a concrete executable task."

  - id: HIGH_CONFIDENCE_WITH_REAL_PHASE_COMPETITION
    trigger: "Confidence ≥ 0.80 when two adjacent phases are genuinely plausible."

  - id: PHASE_REGRESSION_WITHOUT_EXPLICIT_EVIDENCE
    trigger: "Phase moved backward without clear student evidence."

  - id: DOMAIN_MISREAD_AS_TASK_DEFINITION
    trigger: "Domain mention treated as executable task definition, routing to PERFORMANCE before a concrete objective is established."

  - id: ARTIFACT_INTENT_MISCLASSIFIED
    trigger: "Artifact present but continuation/evaluation intent routed incorrectly."

  - id: SIGNALS_NOT_OBSERVABLE
    trigger: "One or more signals depend on invented intent rather than observable wording."

  - id: AFFECTIVE_SIGNAL_MISSED
    trigger: "Student message contains explicit emotional or motivational language that is absent from all route signals."